name: Reward Seat Check

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  run-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Restore watcher state cache
        id: restore-state
        uses: actions/cache/restore@v4
        with:
          path: .state
          key: reward-seat-state-${{ github.run_id }}
          restore-keys: |
            reward-seat-state-

      - name: Run one-off reward seat check
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SMTP_URL: ${{ secrets.SMTP_URL }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          SMTP_SECURE: ${{ secrets.SMTP_SECURE }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
        run: node src/index.mjs --once

      - name: Save watcher state cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: .state
          key: reward-seat-state-${{ github.run_id }}
